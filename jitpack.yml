jdk:
  - openjdk17

# Unset JAVA_TOOL_OPTIONS before invoking Gradle.
#
# WHY (historical, from the native era): JitPack's build image sets
#   JAVA_TOOL_OPTIONS=-Dfile.encoding=UTF-8 -Dhttps.protocols=TLSv1.2
# which the JVM echoes to stderr on every Java process start. AGP
# 7.4.x's prefab integration treated ANY line on prefab-cli's stderr
# as fatal, killing `configureCMakeRelWithDebInfo`.
#
# NetScope no longer has native code and does not invoke prefab-cli,
# so this is no longer strictly necessary. But `env -u JAVA_TOOL_OPTIONS`
# is cheap insurance against any other subprocess tripping the same
# "stderr-line = failure" pattern on JitPack's build image, so we keep
# it. (See docs/HOOK_EVOLUTION.md and docs/BYTEHOOK_LESSONS.md for the
# now-retired native-build story.)
#
# Three artifacts are published. Because JitPack sees multiple modules in
# a single repo, it serves them under its *multi-module* coordinate scheme
# (groupId = com.github.<owner>.<repo>, note the dot):
#   * `com.github.Arrowyi.NetScope:NetScope:<tag|sha>`        — the AAR (Kotlin runtime)
#   * `com.github.Arrowyi.NetScope:NetScope-plugin:<tag|sha>` — the Gradle plugin jar
#   * `com.github.Arrowyi.NetScope:NetScopeHook:<tag|sha>`    — the hook module AAR (optional)
# HMI consumes them with:
#   classpath      'com.github.Arrowyi.NetScope:NetScope-plugin:<...>'
#   implementation 'com.github.Arrowyi.NetScope:NetScope:<...>'
#   implementation 'com.github.Arrowyi.NetScope:NetScopeHook:<...>'  // optional
#
# The plugin is a composite build (see settings.gradle
# `pluginManagement.includeBuild 'netscope-plugin'`), so its publish
# task is addressed by invoking Gradle directly inside the plugin
# directory with `-p netscope-plugin`.
#
# The hook module requires NDK r25c. JitPack's build image does not
# include NDK by default; the build will pick up whatever NDK is
# installed. Set ndkVersion in netscope-hook/build.gradle accordingly.
install:
  - env -u JAVA_TOOL_OPTIONS ./gradlew :netscope-sdk:publishReleasePublicationToMavenLocal
  - env -u JAVA_TOOL_OPTIONS ./gradlew -p netscope-plugin publishReleasePublicationToMavenLocal
  - env -u JAVA_TOOL_OPTIONS ./gradlew :netscope-hook:publishReleasePublicationToMavenLocal
